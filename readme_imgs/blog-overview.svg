<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F4EFE8"/>
  <rect x="60" y="60" width="1080" height="600" rx="28" fill="#FFFDF9" stroke="#1F2937" stroke-width="4"/>
  <rect x="60" y="60" width="1080" height="90" rx="28" fill="#1F2937"/>
  <circle cx="110" cy="105" r="12" fill="#FCA5A5"/>
  <circle cx="150" cy="105" r="12" fill="#FCD34D"/>
  <circle cx="190" cy="105" r="12" fill="#86EFAC"/>
  <text x="240" y="116" fill="#FFFDF9" font-family="Arial, sans-serif" font-size="30" font-weight="700">Fred Blog</text>
  <text x="820" y="116" fill="#D1D5DB" font-family="Arial, sans-serif" font-size="24">Simple Django blog home page</text>

  <rect x="120" y="200" width="690" height="360" rx="24" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="3"/>
  <text x="160" y="250" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">Latest Posts</text>

  <rect x="160" y="285" width="610" height="90" rx="18" fill="#E0F2FE"/>
  <text x="190" y="330" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">New post</text>
  <text x="190" y="360" fill="#334155" font-family="Arial, sans-serif" font-size="22">Readers can open a post and read the full content.</text>

  <rect x="160" y="395" width="610" height="90" rx="18" fill="#DCFCE7"/>
  <text x="190" y="440" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Another post</text>
  <text x="190" y="470" fill="#334155" font-family="Arial, sans-serif" font-size="22">The homepage lists each article title and summary text.</text>

  <rect x="160" y="515" width="220" height="55" rx="16" fill="#1D4ED8"/>
  <text x="196" y="551" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24" font-weight="700">Create Post</text>

  <rect x="850" y="200" width="230" height="360" rx="24" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <text x="885" y="250" fill="#92400E" font-family="Arial, sans-serif" font-size="28" font-weight="700">What it shows</text>
  <text x="885" y="305" fill="#78350F" font-family="Arial, sans-serif" font-size="22">• Blog title</text>
  <text x="885" y="350" fill="#78350F" font-family="Arial, sans-serif" font-size="22">• Post list</text>
  <text x="885" y="395" fill="#78350F" font-family="Arial, sans-serif" font-size="22">• Read links</text>
  <text x="885" y="440" fill="#78350F" font-family="Arial, sans-serif" font-size="22">• Create button</text>
  <text x="885" y="485" fill="#78350F" font-family="Arial, sans-serif" font-size="22">• Login/signup area</text>

  <text x="120" y="625" fill="#475569" font-family="Arial, sans-serif" font-size="24">Documentation preview image generated for README usage.</text>
</svg>
